[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content-Security-Policy — inline <style> is allowed (styles can't
    # exfiltrate tokens), but scripts must come from 'self' only.
    # Supabase REST + realtime WebSocket are the only external connect-src.
    # Google Fonts for the Inter typeface.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://gmywodybfbcztnbrfnnr.supabase.co wss://gmywodybfbcztnbrfnnr.supabase.co https://fonts.googleapis.com; img-src 'self' data: blob: https://*.googleusercontent.com https://lh3.googleusercontent.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Enhancement / patch files — served no-cache so fixes roll out immediately
[[headers]]
  for = "/aero.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/aero.css"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/patch.css"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/patch-security.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/theme-bootstrap.js"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
