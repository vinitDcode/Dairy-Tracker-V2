    <style>
      /* ── Scrollbar: hidden but functional ───────────────── */
      *, *::before, *::after {
        scrollbar-width: none !important;
        -ms-overflow-style: none !important;
        box-sizing: border-box;
      }
      *::-webkit-scrollbar,
      *::-webkit-scrollbar-thumb,
      *::-webkit-scrollbar-track,
      *::-webkit-scrollbar-track-piece,
      *::-webkit-scrollbar-corner {
        display: none !important;
        width: 0 !important;
        height: 0 !important;
        background: transparent !important;
      }

      /* ── Root containment ───────────────────────────────── */
      html, body {
        overflow: hidden;
        height: 100%;
        overscroll-behavior: none;
      }
      #root {
        overflow-y: auto;
        height: 100%;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: none;
        padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px));
      }

      /* ── Scroll containers ──────────────────────────────── */
      [class*="overflow-y-auto"],
      [class*="overflow-y-scroll"],
      [class*="overflow-x-auto"] {
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
        overscroll-behavior: auto;
        touch-action: pan-y;
      }
      [class*="overflow-x-auto"] {
        touch-action: pan-x;
        overscroll-behavior-x: contain;
      }

      /* ── Tap targets ────────────────────────────────────── */
      button, a, [role="button"] {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
      }
      nav, header {
        user-select: none;
        -webkit-user-select: none;
      }

      /* ── SPLASH SCREEN ──────────────────────────────────── */
      #bdf-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #bdf-splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Orb ambience */
      .splash-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(70px);
        pointer-events: none;
        animation: splashOrbFloat 5s ease-in-out infinite alternate;
      }
      .splash-orb-1 {
        width: 340px; height: 340px;
        top: -80px; left: -100px;
        animation-delay: 0s;
      }
      .splash-orb-2 {
        width: 300px; height: 300px;
        bottom: -70px; right: -80px;
        animation-delay: -2.5s;
      }
      .splash-orb-3 {
        width: 200px; height: 200px;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%);
        animation-delay: -1.2s;
      }

      @keyframes splashOrbFloat {
        0%   { transform: scale(1)    translate(0, 0); }
        100% { transform: scale(1.12) translate(3%, -3%); }
      }
      .splash-orb-3 {
        animation: splashOrbPulse 3.5s ease-in-out infinite alternate;
      }
      @keyframes splashOrbPulse {
        0%   { opacity: 0.3; transform: translate(-50%,-50%) scale(1); }
        100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1.3); }
      }

      /* Logo ring */
      .splash-logo-ring {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
        border-radius: 28px;
        animation: splashLogoIn 0.80s cubic-bezier(0.22,1,0.36,1) 0.1s both;
      }

      /* Ring shine sweep */
      .splash-logo-ring::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(135deg,
          rgba(255,255,255,0.22) 0%,
          rgba(255,255,255,0.06) 50%,
          transparent 100%
        );
        pointer-events: none;
      }

      @keyframes splashLogoIn {
        from { opacity: 0; transform: scale(0.75) translateY(20px); }
        to   { opacity: 1; transform: scale(1)    translateY(0); }
      }

      /* Animated ring border */
      .splash-logo-border {
        position: absolute;
        inset: -2px;
        border-radius: 30px;
        background: conic-gradient(
          from 0deg,
          rgba(212,168,83,0)   0%,
          rgba(212,168,83,0.7) 30%,
          rgba(107,173,122,0.5) 60%,
          rgba(212,168,83,0)   100%
        );
        animation: rotateBorder 3s linear infinite;
        pointer-events: none;
        z-index: -1;
      }
      @keyframes rotateBorder {
        to { transform: rotate(360deg); }
      }
      /* Mask the border to show only the edge */
      .splash-logo-border::after {
        content: '';
        position: absolute;
        inset: 2px;
        border-radius: 28px;
        pointer-events: none;
      }

      /* Name */
      .splash-name {
        position: relative;
        z-index: 1;
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        font-size: 1.65rem;
        letter-spacing: 0.03em;
        margin-top: 22px;
        animation: splashLogoIn 0.80s cubic-bezier(0.22,1,0.36,1) 0.28s both;
      }

      .splash-tagline {
        position: relative;
        z-index: 1;
        font-family: 'Inter', sans-serif;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.20em;
        text-transform: uppercase;
        margin-top: 5px;
        opacity: 0.52;
        animation: splashLogoIn 0.80s cubic-bezier(0.22,1,0.36,1) 0.42s both;
      }

      /* Loading indicator — three warm dots */
      .splash-dots {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 8px;
        margin-top: 40px;
        animation: splashLogoIn 0.80s cubic-bezier(0.22,1,0.36,1) 0.58s both;
      }
      .splash-dots span {
        width: 7px; height: 7px;
        border-radius: 50%;
        animation: dotBounce 1.2s ease-in-out infinite;
      }
      .splash-dots span:nth-child(1) { animation-delay: 0.00s; }
      .splash-dots span:nth-child(2) { animation-delay: 0.20s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.40s; }

      @keyframes dotBounce {
        0%, 70%, 100% { transform: scale(0.55); opacity: 0.38; }
        35%            { transform: scale(1.20); opacity: 1.00; }
      }

      /* Progress bar at the bottom of splash */
      .splash-progress {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 2px;
        overflow: hidden;
        z-index: 2;
      }
      .splash-progress-bar {
        height: 100%;
        width: 0%;
        animation: progressFill 2.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
      }
      @keyframes progressFill {
        0%   { width: 0%; }
        60%  { width: 72%; }
        100% { width: 100%; }
      }

      /* ── DARK splash (default before React) ─────────────── */
      html:not([data-aero-theme]) #bdf-splash,
      html[data-aero-theme="dark"] #bdf-splash {
        background: #0B0E09;
      }
      html:not([data-aero-theme]) .splash-orb-1,
      html[data-aero-theme="dark"] .splash-orb-1 {
        background: radial-gradient(circle, rgba(212,168,83,0.22) 0%, transparent 70%);
      }
      html:not([data-aero-theme]) .splash-orb-2,
      html[data-aero-theme="dark"] .splash-orb-2 {
        background: radial-gradient(circle, rgba(107,173,122,0.16) 0%, transparent 70%);
      }
      html:not([data-aero-theme]) .splash-orb-3,
      html[data-aero-theme="dark"] .splash-orb-3 {
        background: radial-gradient(circle, rgba(200,135,58,0.12) 0%, transparent 70%);
      }
      html:not([data-aero-theme]) .splash-logo-ring,
      html[data-aero-theme="dark"] .splash-logo-ring {
        background: linear-gradient(135deg, #1C2416 0%, #141C0F 100%);
        box-shadow:
          0 0 0 1px rgba(212,168,83,0.20),
          0 12px 40px rgba(0,0,0,0.65),
          0 0 32px rgba(212,168,83,0.08);
      }
      html:not([data-aero-theme]) .splash-logo-border::after,
      html[data-aero-theme="dark"] .splash-logo-border::after {
        background: #0B0E09;
      }
      html:not([data-aero-theme]) .splash-name,
      html[data-aero-theme="dark"] .splash-name { color: #F5EDD8; }
      html:not([data-aero-theme]) .splash-tagline,
      html[data-aero-theme="dark"] .splash-tagline { color: #D4A853; }
      html:not([data-aero-theme]) .splash-dots span,
      html[data-aero-theme="dark"] .splash-dots span { background: rgba(212,168,83,0.75); }
      html:not([data-aero-theme]) .splash-progress,
      html[data-aero-theme="dark"] .splash-progress { background: rgba(212,168,83,0.08); }
      html:not([data-aero-theme]) .splash-progress-bar,
      html[data-aero-theme="dark"] .splash-progress-bar {
        background: linear-gradient(90deg, rgba(107,173,122,0.6), rgba(212,168,83,0.9), rgba(200,135,58,0.7));
      }

      /* ── LIGHT splash ────────────────────────────────────── */
      html[data-aero-theme="light"] #bdf-splash {
        background: #FAF7F0;
      }
      html[data-aero-theme="light"] .splash-orb-1 {
        background: radial-gradient(circle, rgba(212,168,83,0.18) 0%, transparent 70%);
      }
      html[data-aero-theme="light"] .splash-orb-2 {
        background: radial-gradient(circle, rgba(62,126,80,0.14) 0%, transparent 70%);
      }
      html[data-aero-theme="light"] .splash-orb-3 {
        background: radial-gradient(circle, rgba(168,114,42,0.10) 0%, transparent 70%);
      }
      html[data-aero-theme="light"] .splash-logo-ring {
        background: linear-gradient(135deg, #FFFDF6 0%, #F5EDD8 100%);
        box-shadow:
          0 0 0 1px rgba(168,114,42,0.18),
          0 8px 32px rgba(100,70,20,0.14),
          0 0 24px rgba(168,114,42,0.07);
      }
      html[data-aero-theme="light"] .splash-logo-border {
        background: conic-gradient(
          from 0deg,
          rgba(168,114,42,0)   0%,
          rgba(168,114,42,0.7) 30%,
          rgba(62,126,80,0.5)  60%,
          rgba(168,114,42,0)   100%
        );
      }
      html[data-aero-theme="light"] .splash-logo-border::after {
        background: #FAF7F0;
      }
      html[data-aero-theme="light"] .splash-name    { color: #221E12; }
      html[data-aero-theme="light"] .splash-tagline { color: #A8722A; }
      html[data-aero-theme="light"] .splash-dots span { background: rgba(168,114,42,0.65); }
      html[data-aero-theme="light"] .splash-progress { background: rgba(168,114,42,0.08); }
      html[data-aero-theme="light"] .splash-progress-bar {
        background: linear-gradient(90deg, rgba(62,126,80,0.6), rgba(168,114,42,0.9), rgba(200,135,58,0.7));
      }

      /* ── reduced-motion ─────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        .splash-orb, .splash-logo-border, .splash-dots span,
        .splash-progress-bar, .splash-logo-ring, .splash-name, .splash-tagline {
          animation: none !important;
        }
        .splash-progress-bar { width: 100% !important; }
      }
    </style>
  </head>

            <linearGradient id="spotFill" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">

      <!-- Farm name -->
      <div class="splash-name">Bhullar Dairy</div>

      <!-- Loading dots -->

    </div><!-- /#bdf-splash -->

    <!-- React app root -->
