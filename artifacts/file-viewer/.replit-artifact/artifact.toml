kind = "web"
previewPath = "/"
title = "File Viewer"
version = "1.0.0"
id = "artifacts/file-viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23225

[services.development]
run = "pnpm --filter @workspace/file-viewer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/file-viewer", "run", "build" ]
publicDir = "artifacts/file-viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23225"
BASE_PATH = "/"
