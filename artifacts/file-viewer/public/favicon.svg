<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1f14"/>
      <stop offset="0.55" stop-color="#061410"/>
      <stop offset="1" stop-color="#020B0E"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="200" r="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39FF14" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#00E5FF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#020B0E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drop" x1="256" y1="90" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5CFFB0"/>
      <stop offset="0.35" stop-color="#39FF14"/>
      <stop offset="1" stop-color="#00A87A"/>
    </linearGradient>
    <linearGradient id="dropStroke" x1="256" y1="90" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B6FFDD"/>
      <stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>

  <!-- App-icon background: rounded square matching the dashboard's dark theme -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- Milk drop — same silhouette as the in-app header logo, enlarged and
       bolder so it stays legible down to favicon size -->
  <path
    d="M256 90C256 90 148 224 148 302C148 371.03 195.965 428 256 428C316.035 428 364 371.03 364 302C364 224 256 90 256 90Z"
    fill="url(#drop)"
    stroke="url(#dropStroke)"
    stroke-width="10"
    stroke-linejoin="round"
  />

  <!-- Inner shine highlight -->
  <ellipse cx="208" cy="248" rx="26" ry="38" fill="#F3FFF7" fill-opacity="0.82" transform="rotate(-18 208 248)"/>

  <!-- Secondary cyan glint along the right edge, echoing the header logo -->
  <path d="M312 210 Q346 270 320 340" stroke="#00E5FF" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
