      /* ── Scrollbar: hide visually but KEEP scroll functionality ─────── */
      *, *::before, *::after {
        scrollbar-width: none !important;
        -ms-overflow-style: none !important;
      }
      *::-webkit-scrollbar,
      *::-webkit-scrollbar-thumb,
      *::-webkit-scrollbar-track,
      *::-webkit-scrollbar-track-piece,
      *::-webkit-scrollbar-corner {
        display: none !important;
        width: 0 !important;
        height: 0 !important;
        background: transparent !important;
      }

      /* ── Root containment: scroll lives in #root ──────────────────────
         Keyboard-safe layout: body uses height:100% + min-height:100vh
         (not 100dvh) so the layout doesn't collapse/jump when a mobile
         virtual keyboard opens and shrinks the visual viewport. #root is
         a flex column so any child that wants flex:1 scroll behavior
         works predictably; overscroll-behavior is "contain" (not "none")
         so the container still absorbs bounce instead of chaining scroll
         to a parent that no longer exists on iOS keyboard-open states. */
      html, body {
        height: 100%;
        min-height: 100vh;
        overflow: hidden; /* horizontal/parent lock only — #root owns vertical scroll */
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        touch-action: pan-y;
        padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px));
      }

      /* ── All scroll containers: momentum + smooth ───────────────────── */

        scroll-behavior: smooth;

        touch-action: pan-y;
      }
      [class*="overflow-x-auto"] {
        touch-action: pan-x;
        overscroll-behavior-x: contain;
      }

      /* ── Buttons / links: no tap flash ──────────────────────────────── */
      button, a, [role="button"] {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
      }

      nav, header {
